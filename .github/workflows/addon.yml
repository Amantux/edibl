name: Build add-on

# Auto-bump the add-on patch version on every release push, then build multi-arch
# images and publish them to GHCR — so Home Assistant always sees an update and
# pulls a prebuilt image (no build on your device).
on:
  push:
    branches: [master]
    paths:
      - "addon/**"
      - "backend/**"
      - "docker-entrypoint.sh"
      - ".github/workflows/addon.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # Bump addon/config.yaml's patch version and commit it back, so Supervisor sees
  # a new version. Skipped on manual runs and on the bot's own bump commit (the
  # commit message carries [skip bump]) to avoid loops.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - id: bump
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git log -1 --pretty=%B | grep -q '\[skip bump\]'; then
            v=$(grep -oP '^version:\s*"\K[\d.]+' addon/config.yaml)
            echo "No bump (manual run or bot commit); building $v"
          else
            v=$(python3 addon/bump-version.py)
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore(ha): auto-bump add-on to $v [skip bump]"
            git pull --rebase --autostash origin master || true
            git push origin master
            echo "Bumped add-on to $v"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    name: Build ${{ matrix.arch }} (${{ needs.version.outputs.version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64]
    steps:
      # Check out the branch head so we get the just-bumped config.yaml.
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/addon \
            --addon
