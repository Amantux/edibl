name: Edibl
version: "1.5.38"
slug: edibl
description: Your kitchen's real food inventory — freshness, waste-learning, and a pantry chat assistant (Ollama / OpenAI / Anthropic).
url: https://github.com/Amantux/edibl/tree/master/addon
# Prebuilt by GitHub Actions and pulled from GHCR — no build on your device.
image: ghcr.io/amantux/edibl-{arch}
# armv7 is omitted: bcrypt/cryptography wheels are unreliable on 32-bit musl.
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
# HA authenticates the user, then proxies to the app — single-tenant mode.
ingress: true
ingress_port: 7746
panel_icon: mdi:food-apple
panel_title: Edibl
# Needed to register auto-discovery with the Supervisor at startup, and to look
# up a sibling add-on (e.g. myMeal) by its real internal hostname. Listing/
# reading OTHER add-ons requires the `manager` role — the default role is denied.
hassio_api: true
hassio_role: manager
# Lets the `homeassistant` LLM provider call HA's conversation agent (and reuse
# whatever chat/Ollama model HA already has configured).
homeassistant_api: true
# Auto-discover the Edibl HACS integration when this add-on is running.
discovery:
  - edibl
# The Edibl MCP server (SSE). Left unmapped by default; set a token and map the
# port if you want Home Assistant's MCP Client (or another agent) to reach it.
ports:
  # Optional. Map 7746 only if you want the HACS integration or other LAN
  # clients to reach the REST API directly (Ingress does not need it).
  7746/tcp: null
  7767/tcp: null
ports_description:
  7746/tcp: Edibl REST API — map only for the HACS integration / LAN access
  7767/tcp: Edibl MCP server (SSE) — set mcp_server_token before exposing
options:
  disable_auth: true
  llm_provider: ""
  llm_base_url: ""
  llm_api_key: ""
  llm_model: ""
  llm_agent_id: ""
  barcode_lookup: false
  barcode_db_key: ""
  mcp_enabled: true
  mcp_server_token: ""
  database_url: ""
  migrate_from_sqlite: false
  ollama_search_key: ""
schema:
  disable_auth: bool
  llm_provider: "list(|ollama|openai|anthropic|homeassistant)"
  llm_base_url: str
  llm_api_key: password
  llm_model: str
  llm_agent_id: str
  # Identify an unknown scanned food barcode (UPC/EAN) online — Open Food Facts →
  # product DB → Ollama web-search — to prefill a new item. Off = scans still work
  # against your own inventory, just no online product lookup.
  barcode_lookup: bool
  # Optional API key for the product-barcode DB. The default lookup endpoint is
  # keyless; set this only if you've pointed the lookup at a keyed provider.
  barcode_db_key: password?
  mcp_enabled: bool
  mcp_server_token: password
  # Optional external Postgres. Blank = the built-in SQLite in /data (recommended
  # for most). Format: postgresql+psycopg://user:pass@host:5432/dbname
  database_url: password?
  # One-shot: with database_url set to an EMPTY Postgres, turn this on and restart
  # once to copy your existing SQLite data into it, then leave it on (it's a no-op
  # once the target has data). See DOCS → External database.
  migrate_from_sqlite: bool
  # Optional Ollama API key (ollama.com) for AI product descriptions — look items
  # up online for a short searchable description. Blank = feature off.
  ollama_search_key: password?
